<!DOCTYPE HTML>
<html>
    <head>
        <title>TextLens - Sentiment Analysis</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
        <link rel="stylesheet" href="assets/css/main.css" /> 
        <link rel="stylesheet" href="style.css" /> 
        <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    </head>
    
    <body class="is-preload">

        <header id="header" class="glass-header">
            <h1 class="logo">TextLens</h1>
            <nav>
                <ul>
                    <li><a href="#analysis-section">Analyze</a></li>
                    <li><a href="#results-section">Results</a></li>
                </ul>
            </nav>
        </header>

        <section id="analysis-section" class="main style1 dark fullscreen">
            <div class="content fade-in">
                <header>
                    <h2 class="glow-text">Sentiment Analysis</h2>
                    <p>Unlock the emotional tone behind any text instantly.</p>
                </header>
                
                <div class="box glass-box">
                    <form id="analysis-form">
                        <div class="fields">
                            <div class="field">
                                <label for="text-input">Paste Text for Analysis:</label>
                                <textarea name="text" id="text-input" placeholder="E.g., 'The service was incredibly fast and friendly!'" rows="6" required></textarea>
                            </div>
                        </div>
                        <ul class="actions special">
                            <li><input type="submit" id="analyze-button" class="primary-btn" value="Analyze Sentiment" /></li>
                        </ul>
                    </form>
                </div>
            </div>
        </section>

        <section id="results-section" class="main style3 secondary">
            <div class="content">
                <header>
                    <h2>Analysis Output</h2>
                    <p>AI-driven insights for your text.</p>
                </header>
                
                <div class="box result-card">
                    <div id="results-container">
                        <p class="placeholder-text">Waiting for text submission...</p>
                    </div>
                </div>
            </div>
        </section>

        <footer id="footer">
            <ul class="menu">
                <li>&copy; COMP 3000 Computing Project [ISAAC DOONG JEN WEY]</li>
            </ul>
        </footer>

        <script src="assets/js/jquery.min.js"></script>
        <script src="assets/js/browser.min.js"></script>
        <script src="assets/js/breakpoints.min.js"></script>
        <script src="assets/js/util.js"></script>
        <script src="assets/js/main.js"></script>
        <script src="script.js"></script> 
    </body>
</html>
